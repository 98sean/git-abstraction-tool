appId: com.viva.app
productName: VIVA
copyright: Copyright © 2024-2025 Sean Lee

publish:
  provider: github
  releaseType: release

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - node_modules/**/*
  - package.json

# Windows — NSIS installer
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# macOS — universal DMG (single binary for Intel + Apple Silicon)
mac:
  target:
    - target: dmg
      arch: [universal]
  icon: resources/icon.icns
  category: public.app-category.developer-tools

dmg:
  title: VIVA

# Linux — AppImage
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icon.png
  category: Development
